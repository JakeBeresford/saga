- request:
    body: "{\"max_tokens\":16000,\"messages\":[{\"role\":\"user\",\"content\":\"#
      Commits\\n0932e73 edit foo and add new.txt\\n\\n# Full diff (every hunk must
      be assigned to a chapter)\\n### HUNK h0 \u2014 foo.py  (@@ -1,5 +1,5 @@)\\n@@
      -1,5 +1,5 @@\\n a\\n-b\\n+B\\n c\\n \\n \\n### HUNK h1 \u2014 foo.py  (@@ -8,4
      +8,5 @@ c)\\n@@ -8,4 +8,5 @@ c\\n \\n \\n x\\n+y\\n z\\n### HUNK h2 \u2014 new.txt
      \ (@@ -0,0 +1,2 @@)\\n@@ -0,0 +1,2 @@\\n+hello\\n+world\"}],\"model\":\"claude-opus-4-8\",\"system\":[{\"type\":\"text\",\"text\":\"You
      are giving a reviewer a guided tour of a code change \u2014 a chapter-by-chapter
      walkthrough that makes a large diff easy to review without losing focus.\\n\\nYou
      are handed:\\n\\n1. **The full diff**, split into labeled hunks. Every hunk
      has a stable id like `h0`, `h1`, \u2026 shown as `### HUNK h3 \u2014 path/to/file
      (new lines 40-55)`.\\n2. **The commit messages** on this change, for context
      on intent and sequencing.\\n3. **Optional intent** \u2014 a plan, spec, or description
      of what the change set out to do. This may be absent; if so, infer intent from
      the diff and commits.\\n\\nYour job: partition the diff into an **ordered list
      of chapters** that tell one coherent story, and explain each in your own voice.\\n\\n##
      Rules\\n\\n- **Cover every hunk.** Every hunk id must appear in at least one
      chapter. This is mandatory \u2014 the walkthrough is rejected if any hunk is
      left out. A hunk may appear in more than one chapter only if it genuinely belongs
      to both.\\n- **Order matters.** Sequence chapters so a reviewer who reads top-to-bottom
      builds understanding naturally \u2014 usually setup/foundation first, then the
      core change, then wiring and tests.\\n- **Group by idea, not by file.** A chapter
      can interleave hunks from several files when they serve one idea.\\n- **Zoom
      out when it helps.** If a chapter is about how the change fits the wider codebase,
      say so in the narration.\\n- **Zoom in on the hard parts.** For complex or non-obvious
      changes, explain why it was needed and why it was done this way rather than
      an alternative.\\n\\n## What each chapter needs\\n\\n- `title` \u2014 a short,
      concrete title.\\n- `summary` \u2014 one line for the table of contents (\u2264
      12 words).\\n- `narration` \u2014 **2\u20134 short sentences, plain language.**
      The intent, the key decision, and the rationale. The reviewer does not want
      a wall of text \u2014 be brief and concrete. Markdown is allowed but keep it
      light.\\n- `hunks` \u2014 the list of hunk ids in this chapter, in reading order.\\n-
      `plan_step` \u2014 when an intent document was supplied, the step/section this
      chapter maps to (e.g. `\\\"PR 1: \u2026\\\"`); otherwise `null`.\\n- `confidence`
      \u2014 `\\\"high\\\"`, `\\\"medium\\\"`, or `\\\"low\\\"`. Use `\\\"low\\\"`
      honestly for anything that deserves close review.\\n- `deviation` \u2014 `null`
      unless an intent was supplied _and_ the implementation diverged from it; then
      a short sentence explaining how and why. Be honest \u2014 deviations are highlighted
      for the reviewer.\\n- `qa` \u2014 `null`, or `{\\\"status\\\": \\\"green\\\",
      \\\"note\\\": \\\"\u2026\\\"}` when tests cover this chapter's changes, or `{\\\"status\\\":
      \\\"none\\\", \\\"note\\\": \\\"\u2026\\\"}` to flag a chapter with no test
      coverage worth noting.\\n\\n## Output\\n\\nReturn **only** a single JSON object,
      no prose before or after, no code fences:\\n\\n```\\n{\\n  \\\"chapters\\\":
      [\\n    {\\n      \\\"id\\\": \\\"ch1\\\",\\n      \\\"title\\\": \\\"\u2026\\\",\\n
      \     \\\"summary\\\": \\\"\u2026\\\",\\n      \\\"narration\\\": \\\"\u2026\\\",\\n
      \     \\\"hunks\\\": [\\\"h0\\\", \\\"h1\\\"],\\n      \\\"plan_step\\\": null,\\n
      \     \\\"confidence\\\": \\\"high\\\",\\n      \\\"deviation\\\": null,\\n
      \     \\\"qa\\\": {\\\"status\\\": \\\"green\\\", \\\"note\\\": \\\"Covered
      by existing tests.\\\"}\\n    }\\n  ]\\n}\\n```\\n\"}],\"tool_choice\":{\"type\":\"tool\",\"name\":\"_SagaOut\"},\"tools\":[{\"name\":\"_SagaOut\",\"description\":\"Correctly
      extracted `_SagaOut` with all the required parameters with correct types\",\"input_schema\":{\"$defs\":{\"_ChapterOut\":{\"properties\":{\"id\":{\"title\":\"Id\",\"type\":\"string\"},\"title\":{\"title\":\"Title\",\"type\":\"string\"},\"summary\":{\"title\":\"Summary\",\"type\":\"string\"},\"narration\":{\"title\":\"Narration\",\"type\":\"string\"},\"hunks\":{\"items\":{\"type\":\"string\"},\"title\":\"Hunks\",\"type\":\"array\"},\"plan_step\":{\"anyOf\":[{\"type\":\"string\"},{\"type\":\"null\"}],\"default\":null,\"title\":\"Plan
      Step\"},\"confidence\":{\"default\":\"medium\",\"enum\":[\"high\",\"medium\",\"low\"],\"title\":\"Confidence\",\"type\":\"string\"},\"deviation\":{\"anyOf\":[{\"type\":\"string\"},{\"type\":\"null\"}],\"default\":null,\"title\":\"Deviation\"},\"qa\":{\"anyOf\":[{\"$ref\":\"#/$defs/_QAOut\"},{\"type\":\"null\"}],\"default\":null}},\"required\":[\"id\",\"title\",\"summary\",\"narration\"],\"title\":\"_ChapterOut\",\"type\":\"object\"},\"_QAOut\":{\"properties\":{\"status\":{\"title\":\"Status\",\"type\":\"string\"},\"note\":{\"default\":\"\",\"title\":\"Note\",\"type\":\"string\"}},\"required\":[\"status\"],\"title\":\"_QAOut\",\"type\":\"object\"}},\"properties\":{\"chapters\":{\"items\":{\"$ref\":\"#/$defs/_ChapterOut\"},\"title\":\"Chapters\",\"type\":\"array\"}},\"required\":[\"chapters\"],\"title\":\"_SagaOut\",\"type\":\"object\"}}]}"
