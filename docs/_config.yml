title: Saga
description: Generate a chapter-by-chapter guided tour of a code change as a single, self-contained static HTML page.
remote_theme: just-the-docs/just-the-docs
url: https://jakeberesford.github.io
baseurl: /saga

color_scheme: saga
logo: "/assets/saga-wordmark-light.svg"

plugins:
  - jekyll-remote-theme

# Plans and the generated example page are not documentation pages.
exclude:
  - plans

aux_links:
  Blog post: https://jakeberesford.com/blog/saga
  GitHub: https://github.com/JakeBeresford/saga
