<link rel="icon" type="image/png" href="{{ '/assets/logo.png' | relative_url }}">
<script>
  (function () {
    // Stored value is the scheme name: "default" (cyan light) or "saga_dark".
    var KEY = "saga-theme";
    var saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}

    // Pre-paint: if the reader chose dark, swap the scheme stylesheet before the
    // body renders so there's no flash of the light theme on navigation.
    if (saved === "saga_dark") {
      var link = document.querySelector('link[rel="stylesheet"]');
      if (link) link.href = link.href.replace("just-the-docs-default.css", "just-the-docs-saga_dark.css");
    }

    window.addEventListener("load", function () {
      if (typeof jtd === "undefined") return;
      var current = saved === "saga_dark" ? "saga_dark" : "default";
      if (current === "saga_dark") jtd.setTheme("saga_dark");

      var btn = document.querySelector(".js-toggle-dark-mode");
      if (!btn) return;
      function label() { btn.textContent = current === "saga_dark" ? "☀ Light" : "☾ Dark"; }
      label();
      jtd.addEvent(btn, "click", function () {
        current = current === "saga_dark" ? "default" : "saga_dark";
        jtd.setTheme(current);
        try { localStorage.setItem(KEY, current); } catch (e) {}
        label();
      });
    });
  })();
</script>
